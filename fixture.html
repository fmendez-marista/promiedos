<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixture — Torneo de Fútbol</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #00e676;
      --accent-dim: #00e67622;
      --text: #e8eaf0;
      --text-muted: #7b7f96;
      --header-bg: #141720;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--header-bg);
      border-bottom: 2px solid var(--accent);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      margin-left: auto;
    }

    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 0.85rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--border);
    }

    .nav-links a.active { color: var(--accent); }

    /* MAIN */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* SECTION TITLE */
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* FECHA CARD */
    .fecha-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    /* PARTIDO ROW */
    .partido-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.12s;
      gap: 0.75rem;
    }

    .partido-row:last-child { border-bottom: none; }
    .partido-row:hover { background: var(--accent-dim); }

    .equipo-local {
      font-weight: 500;
      font-size: 0.95rem;
      text-align: right;
      color: var(--text);
    }

    .equipo-visita {
      font-weight: 500;
      font-size: 0.95rem;
      text-align: left;
      color: var(--text);
    }

    .resultado {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
      text-align: center;
      min-width: 70px;
    }

    .resultado.jugado { color: var(--accent); }
    .resultado.pendiente { color: var(--text-muted); letter-spacing: 1px; }

    /* LOADING / ERROR */
    .estado {
      text-align: center;
      padding: 2.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .estado.error { color: #ff5252; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      nav { gap: 1rem; padding: 0 1rem; }
      .nav-brand { font-size: 1.1rem; }
      .partido-row { padding: 0.65rem 0.85rem; gap: 0.5rem; }
      .equipo-local, .equipo-visita { font-size: 0.82rem; }
      .resultado { font-size: 1rem; min-width: 58px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">⚽ TORNEO</a>
    <div class="nav-links">
      <a href="index.html">Posiciones</a>
      <a href="fixture.html" class="active">Fixture</a>
      <a href="cargar.html">Cargar</a>
    </div>
  </nav>

  <main id="main-fixture">
    <div class="estado">Cargando fixture…</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function cargarFixture() {
      const main = document.getElementById('main-fixture');

      try {
        const { data: equipos, error: eqErr } = await supabaseClient
          .from('equipo').select('id, nombre');
        if (eqErr) throw eqErr;

        const { data: partidos, error: pErr } = await supabaseClient
          .from('partido').select('*').order('numero_fecha').order('id');
        if (pErr) throw pErr;

        const eqMap = {};
        equipos.forEach(e => eqMap[e.id] = e.nombre);

        // Agrupar por fecha
        const fechas = {};
        partidos.forEach(p => {
          if (!fechas[p.numero_fecha]) fechas[p.numero_fecha] = [];
          fechas[p.numero_fecha].push(p);
        });

        main.innerHTML = '';

        Object.keys(fechas).sort((a, b) => a - b).forEach(nf => {
          const section = document.createElement('section');

          const titulo = document.createElement('div');
          titulo.className = 'section-title';
          titulo.textContent = `Fecha ${nf}`;
          section.appendChild(titulo);

          const card = document.createElement('div');
          card.className = 'fecha-card';

          fechas[nf].forEach(p => {
            const row = document.createElement('a');
            row.className = 'partido-row';
            row.href = `partido.html?id=${p.id}`;

            const local = eqMap[p.id_equipo_1] || '?';
            const visita = eqMap[p.id_equipo_2] || '?';

            let resultadoHTML, resultadoClass;
            if (p.jugado) {
              resultadoHTML = `${p.goles_equipo_1} - ${p.goles_equipo_2}`;
              resultadoClass = 'jugado';
            } else {
              resultadoHTML = 'vs';
              resultadoClass = 'pendiente';
            }

            row.innerHTML = `
              <span class="equipo-local">${local}</span>
              <span class="resultado ${resultadoClass}">${resultadoHTML}</span>
              <span class="equipo-visita">${visita}</span>
            `;

            card.appendChild(row);
          });

          section.appendChild(card);
          main.appendChild(section);
        });

      } catch (err) {
        main.innerHTML = `<div class="estado error">Error al cargar el fixture: ${err.message}</div>`;
      }
    }

    cargarFixture();
  </script>

</body>
</html>
